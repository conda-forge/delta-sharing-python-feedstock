{% set version = "1.3.2" %}

package:
  name: delta-sharing-python
  version: {{ version }}

source:
  - folder: dist
    url: https://pypi.org/packages/source/d/delta-sharing/delta_sharing-{{ version }}.tar.gz
    sha256: dcc5351acf76ab87fbd02916688a4dd0f11d826fb0259b4a5d22cf857e7dc09a
  - folder: src
    url: https://github.com/delta-io/delta-sharing/archive/refs/tags/v{{ version }}.tar.gz
    sha256: 511be71ee45d0b42f419f31a79a8cba9b9a4f823a0444884d0778323dda643cb

build:
  number: 0
  noarch: python
  script:
    - cd dist
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - aiohttp
    - fsspec >=0.7.4
    - numpy
    - pandas
    - pyarrow >=4.0.0
    - python >={{ python_min }}
    - requests
    - yarl >=1.6.0

test:
  source_files:
    - src/python/delta_sharing/tests
  requires:
    - pip
    - pytest-cov
    - python {{ python_min }}
  imports:
    - delta_sharing
  commands:
    - pip check

about:
  home: https://delta.io/sharing
  summary: Python Connector for Delta Sharing
  dev_url: https://github.com/delta-io/delta-sharing
  doc_url: https://docs.delta.io/latest/index.html
  license: Apache-2.0
  license_file: src/LICENSE.txt

extra:
  recipe-maintainers:
    - bollwyvl
